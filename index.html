<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário Callback</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
    

<div class="container">

    <h1 class="titulo">
        Responder Formulário
    </h1>

    <div class="callback">
        Callback: <span id="callbackValor">Carregando...</span>
    </div>

    <form id="formulario">

        <div class="campo">
            <label>Campo 1</label>
            <input type="text" id="campo1">
        </div>

        <div class="campo">
            <label>Campo 2</label>
            <input type="text" id="campo2">
        </div>

<button type="submit" id="btnSalvar">
    Salvar Respostas
</button>

    </form>

    <div id="mensagem"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const idCallback = params.get('idCallback');

console.log('ID CALLBACK:', idCallback);

document.getElementById('callbackValor').textContent =
    idCallback || 'Não recebido';

if (!idCallback) {
    document.getElementById('mensagem').innerHTML =
        '<div class="erro">idCallback não recebido.</div>';
}
let enviando = false;

document
    .getElementById('formulario')
    .addEventListener('submit', async (e) => {

        const btnSalvar = document.getElementById('btnSalvar');

btnSalvar.disabled = true;
btnSalvar.innerHTML =
    '<span class="loading">Salvando...</span>';

document.getElementById('mensagem').innerHTML = '';

    e.preventDefault();

        if (enviando) {
        return;
    }

    enviando = true;

    const campo1 = document.getElementById('campo1').value;
    const campo2 = document.getElementById('campo2').value;

    try {

       const payload = {
    idDatabase: 'PvUFmjg6zHA263i7C6inWmFyT92qUv',
    idCallback: idCallback,
    answer: {
        idCallback: idCallback,
        campo1: campo1,
        campo2: campo2
    },
    returnImmediately: false
};

console.log('PAYLOAD', JSON.stringify(payload, null, 2));

const response = await fetch(
    'https://dev-api.colmeia.me/v1/rest/callback-resume-bot-flow',
    {
        method: 'POST',
        headers: {
            Authorization: 'yUqBz8wIZO3sB4R3eMwqXP4JnOJl1bt3C256JbvrcDvHEeHlQm',
            'Content-Type': 'application/json',
            idSocialNetwork: 'vxPM6MlJyr0FMjtumDKyZIguRgQKEr'
        },
        body: JSON.stringify(payload)
    }
);

const body = await response.text();

console.log('STATUS', response.status);
console.log('BODY', body);

        if (!response.ok) {
            throw new Error('Erro na API');
        }

    btnSalvar.innerHTML = '✅ Salvo';
    document
    .querySelectorAll('input')
    .forEach(input => input.disabled = true);

        document.getElementById('formulario').reset();

    } catch (err) {

    console.error(err);
    enviando = false;
    btnSalvar.disabled = false;
    btnSalvar.innerHTML = 'Salvar Respostas';

    document.getElementById('mensagem').innerHTML =
        '<div class="erro">❌ Erro ao salvar.</div>';
}

});
</script>

</body>
</html>
